<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>©️Samsung</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
  html, body { height:100%; background:#f4f5f7; }
  body { padding-bottom:70px; }

  .top { background:#1d1f25; color:#fff; padding:20px 16px; font-size:24px; }

  .info {
    background:#fff; margin:20px; padding:14px 18px;
    border-radius:14px; display:flex; align-items:center; gap:10px;
  }
  .admin-tag { color:#ff4757; font-weight:bold; }
  .rename-btn {
    background:#3792f7; color:#fff; border:none;
    padding:6px 12px; border-radius:10px; font-size:14px;
  }

  .chat {
    background:#fff; margin:20px; border-radius:14px;
    height: calc(100vh - 240px); overflow:hidden;
  }
  .msg { padding:14px; overflow-y:auto; height:100%; }

  /* 输入框 —— 键盘弹出绝对不遮挡 */
  .input-bar {
    display:flex; padding:12px; gap:8px;
    background:#fff; border-top:1px solid #eee;
    position:fixed; left:0; right:0; bottom:0;
    z-index:999; background:#fff;
  }
  .input-main {
    flex:1; padding:14px 16px; border:1px solid #e1e2e2;
    border-radius:14px; font-size:15px; background:#f9f9fb;
  }
  .btn { padding:0 18px; border:none; border-radius:14px; font-size:15px; color:#fff; }
  .btn-send { background:#2ed573; white-space:nowrap; }

  .item {
    max-width:75%; padding:10px 14px; border-radius:12px; margin:6px 0;
  }
  .me { background:#2ed573; color:#fff; margin-left:auto; }
  .other { background:#f1f1f1; }

  .mention { background:#fffdc0; color:#000; padding:2px 4px; border-radius:4px; font-weight:bold; }

  #atList {
    position:absolute; bottom:70px; left:12px; background:#fff;
    border-radius:12px; box-shadow:0 4px 12px #0002;
    max-height:200px; overflow-y:auto; width:200px; z-index:10; display:none;
  }
  .atItem { padding:10px 14px; cursor:pointer; }
  .atItem:hover { background:#f5f5f7; }

  #banPopup {
    position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5);
    display:none; align-items:center; justify-content:center; z-index:9999;
  }
  .ban-box { background:#fff; width:300px; border-radius:16px; padding:20px; max-height:80vh; overflow-y:auto; }
  .ban-title { font-size:18px; font-weight:bold; margin-bottom:12px; text-align:center; }
  .ban-item { padding:10px 14px; border-radius:8px; cursor:pointer; margin-bottom:4px; }
  .ban-item:hover { background:#f0f0f0; }
  .banned { background:#ffe0e0; color:#c00; }
  .admin-user { background:#e0f0ff; color:#0066cc; cursor:not-allowed; }

  .name { font-size:12px; color:#666; margin-bottom:4px; }
  .time { font-size:11px; color:#999; text-align:right; margin-top:4px; }

  /* 输入悬浮预览窗核心样式 */
  #inputPreview {
    position:fixed; top:20px; right:20px; z-index:998;
    background:#fff; border-radius:12px; padding:12px 16px;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
    font-size:16px; max-width:60%; min-width:180px;
    display:none; word-break:break-all;
  }
  #inputPreview::before {
    content:"输入预览"; display:block; font-size:12px; color:#999; margin-bottom:4px;
  }
</style>

<body>
<div class="top">Samsung在线聊天</div>

<div class="info">
  你的身份：<span id="nick"></span>
  <span id="adminTag"></span>
  <button id="renameBtn" class="rename-btn">改名</button>
</div>

<div class="chat">
  <div class="msg" id="msgBox"></div>
</div>

<!-- 输入悬浮预览窗 -->
<div id="inputPreview"></div>

<div class="input-bar">
  <div id="atList"></div>
  <input class="input-main" id="input" placeholder="输入消息…，输入 @ 可提及他人">
  <button class="btn btn-send" id="send">发送</button>
</div>

<div id="banPopup">
  <div class="ban-box">
    <div class="ban-title">选择禁言/解除</div>
    <div id="banList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://dymvlpeigdvnqhbmhump.supabase.co";
const SUPABASE_KEY = "sb_publishable_3-phT7SANaA58aDQAYOMJg_u464NPdq";

let uid = localStorage.getItem("uid") || "user_" + Math.random().toString(36).slice(-8);
localStorage.setItem("uid", uid);

let isAdmin = localStorage.getItem("is_admin") === "true";
let nickname = localStorage.getItem("nickname") || uid;
document.getElementById("nick").innerText = nickname;

let bannedUsers = JSON.parse(localStorage.getItem("bannedUsers") || "[]");
let adminList = JSON.parse(localStorage.getItem("adminList") || "[]");

if (isAdmin) {
  document.getElementById("adminTag").innerHTML = '<span class="admin-tag">👑 管理员</span>';
  if (!adminList.includes(nickname)) {
    adminList.push(nickname);
    localStorage.setItem("adminList", JSON.stringify(adminList));
  }
}

function canRename() {
  if (isAdmin) return true;
  const t = localStorage.getItem("last_rename_time");
  return !t || Date.now() - parseInt(t) > 24*60*60*1000;
}

document.getElementById("renameBtn").onclick = () => {
  if (!canRename()) return alert("24小时只能改名一次");
  const newName = prompt("新名字：", nickname);
  if (!newName || newName.length < 2 || newName.length > 10) return;
  nickname = newName;
  localStorage.setItem("nickname", nickname);
  localStorage.setItem("last_rename_time", Date.now());
  document.getElementById("nick").innerText = nickname;
  alert("改名成功！");
};

const gradients = [
  "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
  "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
  "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
  "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
  "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
  "linear-gradient(135deg, #30cfd0 0%, #330867 100%)",
  "linear-gradient(135deg, #ff6b6b 0%, #feca57 100%)"
];

function getFixedColor(id) {
  return gradients[id % gradients.length];
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const msgBox = document.getElementById("msgBox");
const input = document.getElementById("input");
const atList = document.getElementById("atList");
const banPopup = document.getElementById("banPopup");
const banList = document.getElementById("banList");
const inputPreview = document.getElementById("inputPreview"); // 悬浮窗元素

// 悬浮窗核心逻辑
input.addEventListener("focus", () => {
  setTimeout(() => {
    input.scrollIntoView({ behavior:"smooth", block:"end" });
    if (input.value.trim()) inputPreview.style.display = "block"; // 有内容时显示
  }, 300);
});

input.addEventListener("input", () => {
  const val = input.value.trim();
  if (val) {
    inputPreview.style.display = "block";
    inputPreview.innerHTML = `<span style="font-size:12px;color:#999;">输入预览</span><br>${val.replace(/@([^\s]+)/g, '<span class="mention">@$1</span>')}`;
  } else {
    inputPreview.style.display = "none"; // 无内容时隐藏
  }
  // @提及逻辑保持不变
  if (val.endsWith("@")) {
    loadAtList();
  }
});

input.addEventListener("blur", () => {
  setTimeout(() => {
    inputPreview.style.display = "none"; // 失去焦点隐藏
  }, 200); // 兼容发送按钮点击
});

// 简化@提及列表加载
async function loadAtList() {
  const { data } = await sb.from("messages")
    .select("uid, nick")
    .order("time", { ascending: false })
    .limit(100);

  const userMap = {};
  data.forEach(item => {
    if (!userMap[item.uid]) userMap[item.uid] = item.nick;
  });
  showAtList(Object.values(userMap));
}

async function openBanPanel() {
  const { data } = await sb.from("messages")
    .select("uid, nick")
    .order("time", { ascending: false });

  const userMap = {};
  data.forEach(item => {
    if(!userMap[item.uid]) userMap[item.uid] = item.nick;
  });
  const users = Object.values(userMap);

  banList.innerHTML = "";
  users.forEach(u => {
    const isAdminUser = adminList.includes(u);
    const div = document.createElement("div");
    
    if (isAdminUser) {
      div.className = "ban-item admin-user";
      div.innerText = u + " (管理员)";
      div.onclick = () => alert("❌ 无法禁言管理员");
    } else {
      div.className = "ban-item" + (bannedUsers.includes(u) ? " banned" : "");
      div.innerText = u;
      div.onclick = () => {
        if(bannedUsers.includes(u)){
          bannedUsers = bannedUsers.filter(x=>x!==u);
          alert("✅ 已解除禁言："+u);
        }else{
          bannedUsers.push(u);
          alert("🔇 已禁言："+u);
        }
        localStorage.setItem("bannedUsers", JSON.stringify(bannedUsers));
        openBanPanel();
      };
    }
    banList.appendChild(div);
  });
  banPopup.style.display = "flex";
}

async function send() {
  let text = input.value.trim();
  input.value = "";
  if (!text) return;

  if (!isAdmin && bannedUsers.includes(nickname)) {
    alert("🔇 你已被禁言");
    return;
  }

  if (isAdmin) {
    if (text === "/op13143") {
      isAdmin = true;
      localStorage.setItem("is_admin", "true");
      if (!adminList.includes(nickname)) {
        adminList.push(nickname);
        localStorage.setItem("adminList", JSON.stringify(adminList));
      }
      document.getElementById("adminTag").innerHTML = '<span class="admin-tag">👑 管理员</span>';
      alert("✅ 你已成为管理员");
      return;
    }
    if (text === "/clean") {
      await sb.from("messages").delete().neq("id", 0);
      alert("✅ 已清空所有聊天记录");
      load();
      return;
    }
    if (text === "/ban") {
      openBanPanel();
      return;
    }
  }

  await sb.from("messages").insert([{
    uid: uid,
    nick: nickname,
    text: text,
    time: new Date().toISOString()
  }]);
  atList.style.display = "none";
  inputPreview.style.display = "none"; // 发送后隐藏悬浮窗
  load();
}

document.getElementById("send").onclick = send;
input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

function showAtList(users) {
  atList.innerHTML = "";
  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "atItem";
    div.innerText = u;
    div.onclick = () => {
      input.value = input.value.replace(/@$/, "@" + u + " ");
      atList.style.display = "none";
      input.focus();
    };
    atList.appendChild(div);
  });
  atList.style.display = "block";
}

async function load() {
  const { data } = await sb
    .from("messages")
    .select("*")
    .order("time", { ascending: true })
    .limit(200);

  msgBox.innerHTML = "";
  data.forEach(m => {
    const time = new Date(m.time).toLocaleTimeString();
    const isMsgAdmin = (m.uid === uid && isAdmin);
    const isMe = m.uid === uid;

    const div = document.createElement("div");
    div.className = "item " + (isMe ? "me" : "other");

    if (isMsgAdmin) {
      div.style.background = getFixedColor(m.id);
      div.style.color = "#fff";
      div.style.fontWeight = "500";
    }

    let content = m.text.replace(/@([^\s]+)/g, '<span class="mention">@$1</span>');

    div.innerHTML = `
      <div class="name">${m.nick}</div>
      <div>${content}</div>
      <div class="time">${time}</div>
    `;
    msgBox.appendChild(div);
  });
  msgBox.scrollTop = msgBox.scrollHeight;
}

banPopup.onclick = (e)=>{
  if(e.target === banPopup) banPopup.style.display = "none";
};

load();
setInterval(load, 3000);
</script>
</body>
</html>
