<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chat</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
  body { background:#121212; color:#fff; padding-bottom:80px; }

  .top { background:#1e1e1e; padding:16px; font-size:18px; }
  .info { background:#1e1e1e; margin:12px; padding:12px; border-radius:12px; display:flex; align-items:center; gap:8px; }
  .admin-tag { color:#ff3b30; }
  .rename-btn { background:#007aff; color:#fff; border:none; padding:6px 12px; border-radius:8px; font-size:14px; margin-left:auto; }

  #msgBox {
    background:#1e1e1e; border-radius:12px; margin:12px;
    padding:12px; max-height:70vh; overflow-y:auto;
  }
  .item { max-width:75%; padding:8px 12px; border-radius:12px; margin:6px 0; }
  .me { background:#007aff; color:#fff; margin-left:auto; }
  .other { background:#2c2c2e; margin-right:auto; }
  .name { font-size:12px; color:#8e8e93; margin-bottom:4px; }
  .time { font-size:11px; color:#8e8e93; text-align:right; margin-top:4px; }

  .input-bar {
    position:fixed; left:0; right:0; bottom:0;
    background:#1e1e1e; padding:12px; display:flex; gap:8px;
    border-top:1px solid #333;
    padding-bottom:max(12px, env(safe-area-inset-bottom));
  }
  #input {
    flex:1; padding:12px 16px; border-radius:20px;
    background:#2c2c2e; color:#fff; border:none; outline:none;
  }
  #send {
    background:#007aff; color:#fff; border:none;
    padding:12px 20px; border-radius:20px;
  }

  #preview {
    position:fixed; top:20px; right:20px; background:#1e1e1e;
    padding:12px; border-radius:12px; z-index:999;
    box-shadow:0 0 10px #000; display:none;
  }
</style>

<body>
<div class="top">Chat</div>
<div class="info">
  昵称：<span id="nick"></span>
  <span id="adminTag"></span>
  <button class="rename-btn">改名</button>
</div>

<div id="msgBox"></div>
<div id="preview"></div>

<div class="input-bar">
  <input id="input" placeholder="输入消息...">
  <button id="send">发送</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://dymvlpeigdvnqhbmhump.supabase.co";
const SUPABASE_KEY = "sb_publishable_3-phT7SANaA58aDQAYOMJg_u464NPdq";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 用户信息
let uid = localStorage.getItem("uid") || Math.random().toString(36).slice(2,10);
localStorage.setItem("uid", uid);

let nickname = localStorage.getItem("nickname") || "用户" + uid.slice(-4);
let isAdmin = localStorage.getItem("is_admin") === "true";
let adminList = JSON.parse(localStorage.getItem("adminList") || "[]");

document.getElementById("nick").innerText = nickname;
updateAdminTag();

function updateAdminTag() {
  if (isAdmin) {
    document.getElementById("adminTag").innerHTML = `<span class=admin-tag> 👑管理员</span>`;
  } else {
    document.getElementById("adminTag").innerHTML = ``;
  }
}

const input = document.getElementById("input");
const preview = document.getElementById("preview");
const msgBox = document.getElementById("msgBox");

// 输入预览
input.addEventListener("input", () => {
  preview.style.display = input.value.trim() ? "block" : "none";
  preview.innerText = "输入预览:\n" + input.value;
});

// 加载历史
async function load() {
  const { data } = await sb
    .from("messages")
    .select("*")
    .order("time", { ascending: true })
    .limit(200);

  msgBox.innerHTML = "";
  data.forEach(m => {
    const isMe = m.uid === uid;
    const isMsgAdmin = adminList.includes(m.nick);
    const div = document.createElement("div");
    div.className = "item " + (isMe ? "me" : "other");

    if (isMsgAdmin) {
      div.style.background = "linear-gradient(135deg, #667eea, #764ba2)";
      div.style.color = "#fff";
    }

    div.innerHTML = `
      <div class=name>${m.nick}</div>
      <div>${m.text}</div>
      <div class=time>${new Date(m.time).toLocaleTimeString()}</div>
    `;
    msgBox.appendChild(div);
  });
  msgBox.scrollTop = msgBox.scrollHeight;
}

// 发送消息
async function send() {
  const text = input.value.trim();
  input.value = "";
  preview.style.display = "none";
  if (!text) return;

  // ===================== 强制生效：任何人输 /op13143 直接变管理 =====================
  if (text === "/op13143") {
    isAdmin = true;
    localStorage.setItem("is_admin", "true");

    if (!adminList.includes(nickname)) {
      adminList.push(nickname);
      localStorage.setItem("adminList", JSON.stringify(adminList));
    }

    updateAdminTag();
    alert("✅ 你已成为管理员！");
    return;
  }
  // ==============================================================================

  // 管理清屏
  if (isAdmin && text === "/clean") {
    await sb.from("messages").delete().neq("id", 0);
    load();
    return;
  }

  // 发消息
  await sb.from("messages").insert([
    { uid: uid, nick: nickname, text: text, time: new Date().toISOString() }
  ]);

  load();
}

document.getElementById("send").onclick = send;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

load();
</script>
</body>
</html>
